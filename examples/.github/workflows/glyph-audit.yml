# Copy this file into your repo at `.github/workflows/glyph-audit.yml`.
# It will run on every pull request and post a sticky comment with the chart
# audit results (diff, findings, trust score, before/after renders).
#
# See https://github.com/seanhanca/glyph-audit-action for full docs.
name: Glyph audit
on: pull_request

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` lets the action push rendered SVGs to an orphan
      # `.glyph-audit` branch so the PR comment can embed them inline.
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @glyph/cli
      - uses: seanhanca/glyph-audit-action@v1
        with:
          spec-pattern: "**/*.glyph.json"
          glyph-version: latest
          fail-on: error
          comment-mode: sticky
