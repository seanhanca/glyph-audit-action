# Copy this file into your repo at `.github/workflows/glyph-audit.yml`.
# It will run on every pull request and post a sticky comment with the chart
# audit findings + spec diff.
#
# See https://github.com/seanhanca/glyph-audit-action for full docs.
name: Glyph audit
on: pull_request

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      # `pull-requests: write` lets the action upsert the sticky comment.
      # The default token already carries `contents: read`, which is enough
      # to fetch spec contents at the base + head SHAs.
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: seanhanca/glyph-audit-action@v0.2
        with:
          spec-pattern: "**/*.glyph.json"
          # Severity threshold for failing the workflow. `error` blocks the
          # PR on a HIGH finding (truncated axes, undisclosed log scales).
          # Use `warning` to also block on MEDIUM, `any` to block on
          # anything, or `none` for comment-only mode.
          fail-on: error
          comment-mode: sticky
