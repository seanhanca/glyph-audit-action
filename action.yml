name: "Glyph Chart Audit"
description: "Audit Glyph chart specs on every PR: JSON diff, audit findings, trust score, and before/after SVG renders."
author: "seanhanca"
branding:
  icon: bar-chart-2
  color: blue
inputs:
  spec-pattern:
    description: "Glob pattern for chart spec files."
    required: false
    default: "**/*.glyph.json"
  glyph-version:
    description: "Version of @glyph/cli to use (default: latest)."
    required: false
    default: "latest"
  fail-on:
    description: "Exit non-zero when an audit finding at this severity or higher is detected."
    required: false
    default: "none"
  comment-mode:
    description: "Comment style: sticky (one comment, edited) | new (a new comment per push)."
    required: false
    default: "sticky"
runs:
  using: "node20"
  main: "dist/index.js"
